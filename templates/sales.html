{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1><i class="fa-solid fa-receipt page-icon"></i> Sales</h1>
    <p class="page-sub">View all sales orders placed by customers</p>
</div>

<!-- STATS ROW -->
<div class="cards" style="margin-bottom:20px;">
    <div class="card kpi-card" style="margin-bottom:0;">
        <div class="kpi-icon" style="background:rgba(56,189,248,0.12);color:#38bdf8;">
            <i class="fa-solid fa-receipt"></i>
        </div>
        <div>
            <p class="kpi-label">Total Orders</p>
            <p class="kpi-value" id="totalOrders">—</p>
        </div>
    </div>
    <div class="card kpi-card" style="margin-bottom:0;">
        <div class="kpi-icon" style="background:rgba(34,197,94,0.12);color:#4ade80;">
            <i class="fa-solid fa-indian-rupee-sign"></i>
        </div>
        <div>
            <p class="kpi-label">Total Revenue</p>
            <p class="kpi-value" id="totalRevenue">—</p>
        </div>
    </div>
    <div class="card kpi-card" style="margin-bottom:0;">
        <div class="kpi-icon" style="background:rgba(167,139,250,0.12);color:#a78bfa;">
            <i class="fa-solid fa-users"></i>
        </div>
        <div>
            <p class="kpi-label">Unique Customers</p>
            <p class="kpi-value" id="uniqueCustomers">—</p>
        </div>
    </div>
    <div class="card kpi-card" style="margin-bottom:0;">
        <div class="kpi-icon" style="background:rgba(251,146,60,0.12);color:#fb923c;">
            <i class="fa-solid fa-calendar-day"></i>
        </div>
        <div>
            <p class="kpi-label">Today's Orders</p>
            <p class="kpi-value" id="todayOrders">—</p>
        </div>
    </div>
</div>

<!-- SALES HISTORY -->
<div class="card">
    <div class="history-header">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Sales History</h2>
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="saleSearch"
                   placeholder="Search by customer..."
                   oninput="filterSales()">
        </div>
    </div>

    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Invoice ID</th>
                    <th>Customer</th>
                    <th>Total Amount</th>
                    <th>Date & Time</th>
                </tr>
            </thead>
            <tbody id="salesBody">
                <tr><td colspan="5" class="loading-row">Loading sales...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<style>
.kpi-card { display:flex; align-items:center; gap:16px; padding:20px 22px; }
.kpi-icon  { width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.kpi-label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.7px; font-weight:600; margin-bottom:5px; }
.kpi-value { font-size:1.35rem; font-weight:700; color:var(--text-primary); }
</style>

<script>
let allSales = [];

loadSales();

function loadSales() {
    fetch('/get_sales')
    .then(res => res.json())
    .then(data => {
        allSales = data;
        renderSales(data);
        updateStats(data);
    })
    .catch(() => {
        document.getElementById("salesBody").innerHTML =
            `<tr><td colspan="5" class="loading-row">Failed to load sales.</td></tr>`;
    });
}

function updateStats(data) {
    // Total orders
    document.getElementById("totalOrders").textContent = data.length;

    // Total revenue
    const revenue = data.reduce((s, d) => s + parseFloat(d.total_amount), 0);
    document.getElementById("totalRevenue").textContent = `Rs. ${revenue.toFixed(2)}`;

    // Unique customers
    const unique = new Set(data.map(d => d.customer_name)).size;
    document.getElementById("uniqueCustomers").textContent = unique;

    // Today's orders
    const today = new Date().toISOString().split('T')[0];
    const todayCount = data.filter(d => d.invoice_date.startsWith(today)).length;
    document.getElementById("todayOrders").textContent = todayCount;
}

function renderSales(data) {
    const body = document.getElementById("salesBody");
    if (data.length === 0) {
        body.innerHTML = `<tr><td colspan="5" class="loading-row">No sales recorded yet.</td></tr>`;
        return;
    }
    body.innerHTML = "";
    data.forEach((s, i) => {
        body.innerHTML += `
            <tr>
                <td style="color:var(--text-muted);">${i + 1}</td>
                <td><span class="invoice-badge">INV-${String(s.invoice_id).padStart(4,'0')}</span></td>
                <td style="color:var(--text-primary);font-weight:500;">${s.customer_name || 'Walk-in Customer'}</td>
                <td class="amount-cell">Rs. ${parseFloat(s.total_amount).toFixed(2)}</td>
                <td class="date-cell">${s.invoice_date}</td>
            </tr>`;
    });
}

function filterSales() {
    const query = document.getElementById("saleSearch").value.toLowerCase().trim();
    if (query === '') { renderSales(allSales); return; }
    const filtered = allSales.filter(s =>
        (s.customer_name || '').toLowerCase().includes(query)
    );
    if (filtered.length === 0) {
        document.getElementById("salesBody").innerHTML =
            `<tr><td colspan="5" class="loading-row">No sales found for "${query}"</td></tr>`;
    } else { renderSales(filtered); }
}
</script>

{% endblock %}

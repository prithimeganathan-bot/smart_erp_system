<!DOCTYPE html>
<html>
<head>
    <title>Smart ERP | Customer Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(80px); z-index: 0; pointer-events: none;
        }
        .orb-1 { width:400px; height:400px; background:rgba(56,189,248,0.07); top:-100px; left:-100px; }
        .orb-2 { width:300px; height:300px; background:rgba(167,139,250,0.05); bottom:-80px; right:-80px; }

        .login-card {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            margin: 20px;
            background: #1a2436;
            border: 1px solid #1e293b;
            border-radius: 20px;
            padding: 40px;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .logo-wrap {
            display: flex; flex-direction: column;
            align-items: center; margin-bottom: 28px;
        }

        .logo-wrap img { width:52px; height:52px; object-fit:contain; margin-bottom:12px; }
        .brand-name { font-size:1.2rem; font-weight:700; color:#f1f5f9; }
        .brand-sub  { font-size:0.72rem; color:#38bdf8; text-transform:uppercase; letter-spacing:1.2px; margin-top:3px; }

        .tabs {
            display: flex; background: #0f172a;
            border-radius: 10px; padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1; padding: 9px;
            background: transparent; border: none;
            border-radius: 8px; color: #475569;
            font-size: 0.88rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }

        .tab-btn.active { background: #1a2436; color: #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .field-wrap { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

        .field-wrap label {
            font-size: 0.72rem; color: #475569;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
        }

        .field-inner { position: relative; }

        .field-inner .field-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: #334155;
            font-size: 0.85rem; pointer-events: none;
        }

        .field-inner input {
            width: 100%; padding: 11px 14px 11px 40px;
            background: #0f172a; border: 1px solid #2d3f55;
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.9rem; outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .field-inner input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
        }

        .field-inner input::placeholder { color: #334155; }

        .submit-btn {
            width: 100%; padding: 12px;
            background: #38bdf8; color: #0f172a;
            border: none; border-radius: 10px;
            font-weight: 700; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s;
            font-family: inherit;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            margin-top: 4px;
        }

        .submit-btn:hover {
            background: #0ea5e9;
            box-shadow: 0 4px 20px rgba(56,189,248,0.3);
            transform: translateY(-1px);
        }

        .error-msg {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 8px; color: #f87171;
            font-size: 0.85rem; margin-bottom: 16px;
        }

        .divider { height:1px; background:#1e293b; margin: 20px 0; }

        .admin-link {
            text-align: center;
            font-size: 0.78rem; color: #334155;
        }

        .admin-link a { color: #38bdf8; text-decoration: none; }
        .admin-link a:hover { text-decoration: underline; }

        .footer { text-align:center; margin-top:20px; font-size:0.72rem; color:#334155; }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-card">

    <div class="logo-wrap">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Smart ERP">
        <div class="brand-name">Smart ERP Shop</div>
        <div class="brand-sub">Customer Portal</div>
    </div>

    {% if error %}
    <div class="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login', this)">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
        <button class="tab-btn" onclick="switchTab('register', this)">
            <i class="fa-solid fa-user-plus"></i> Register
        </button>
    </div>

    <!-- LOGIN FORM -->
    <div class="tab-content active" id="tab-login">
        <form method="POST" action="/customer_login">
            <div class="field-wrap">
                <label>Email Address</label>
                <div class="field-inner">
                    <input type="email" name="email" placeholder="Enter your email" required>
                    <i class="fa-solid fa-envelope field-icon"></i>
                </div>
            </div>
            <div class="field-wrap">
                <label>Password</label>
                <div class="field-inner">
                    <input type="password" name="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-lock field-icon"></i>
                </div>
            </div>
            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Login & Shop
            </button>
        </form>
    </div>

    <!-- REGISTER FORM -->
    <div class="tab-content" id="tab-register">
        <form method="POST" action="/customer_register">
            <div class="field-wrap">
                <label>Full Name</label>
                <div class="field-inner">
                    <input type="text" name="name" placeholder="Enter your full name" required>
                    <i class="fa-solid fa-user field-icon"></i>
                </div>
            </div>
            <div class="field-wrap">
                <label>Email Address</label>
                <div class="field-inner">
                    <input type="email" name="email" placeholder="Enter your email" required>
                    <i class="fa-solid fa-envelope field-icon"></i>
                </div>
            </div>
            <div class="field-wrap">
                <label>Phone Number</label>
                <div class="field-inner">
                    <input type="text" name="phone" placeholder="Enter your phone number">
                    <i class="fa-solid fa-phone field-icon"></i>
                </div>
            </div>
            <div class="field-wrap">
                <label>Password</label>
                <div class="field-inner">
                    <input type="password" name="password" placeholder="Create a password" required>
                    <i class="fa-solid fa-lock field-icon"></i>
                </div>
            </div>
            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-user-plus"></i> Create Account
            </button>
        </form>
    </div>

    <div class="divider"></div>

    <div class="admin-link">
        Are you staff? <a href="{{ url_for('login') }}">Admin Login</a>
    </div>

    <div class="footer">&copy; 2026 Smart ERP System</div>

</div>

<script>
function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html data-theme="dark">
<head>
    <title>Smart ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ══════════════════════════════════════
           THEME VARIABLES
        ══════════════════════════════════════ */
        :root {
            --accent:       #38bdf8;
            --accent-dark:  #0ea5e9;
            --accent-glow:  rgba(56,189,248,0.15);
        }

        /* DARK THEME (default) */
        [data-theme="dark"] {
            --bg-body:      #0f172a;
            --bg-sidebar:   #0d1526;
            --bg-card:      #1a2436;
            --bg-input:     #0f172a;
            --border:       #1e293b;
            --border-input: #2d3f55;
            --text-primary: #f1f5f9;
            --text-second:  #94a3b8;
            --text-muted:   #475569;
            --text-faint:   #334155;
            --nav-link:     #4e6280;
            --scrollbar:    #334155;
        }

        /* LIGHT THEME */
        [data-theme="light"] {
            --bg-body:      #f1f5f9;
            --bg-sidebar:   #ffffff;
            --bg-card:      #ffffff;
            --bg-input:     #f8fafc;
            --border:       #e2e8f0;
            --border-input: #cbd5e1;
            --text-primary: #0f172a;
            --text-second:  #334155;
            --text-muted:   #64748b;
            --text-faint:   #94a3b8;
            --nav-link:     #64748b;
            --scrollbar:    #cbd5e1;
        }

        /* ══════════════════════════════════════
           BASE
        ══════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-second);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

        /* ══════════════════════════════════════
           SIDEBAR
        ══════════════════════════════════════ */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .sidebar-logo {
            padding: 22px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo img { width: 36px; height: 36px; object-fit: contain; }

        .brand-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); display: block; }
        .brand-sub  { font-size: 0.66rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; display: block; }

        .sidebar-user {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.88rem;
            color: #0f172a; flex-shrink: 0;
        }

        .user-name { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); display: block; }
        .user-role { font-size: 0.68rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; display: block; }

        .nav-label {
            padding: 16px 20px 6px;
            font-size: 0.64rem; color: var(--text-faint);
            text-transform: uppercase; letter-spacing: 1.3px; font-weight: 700;
        }

        .sidebar nav { padding: 8px 12px; flex: 1; }

        .sidebar nav a {
            display: flex; align-items: center; gap: 11px;
            padding: 10px 14px; border-radius: 9px;
            color: var(--nav-link); text-decoration: none;
            font-size: 0.875rem; font-weight: 500;
            transition: all 0.18s ease;
            margin-bottom: 2px; position: relative;
        }

        .sidebar nav a i { width: 16px; text-align: center; font-size: 0.85rem; flex-shrink: 0; }

        .sidebar nav a:hover { background: var(--accent-glow); color: var(--text-second); }

        .sidebar nav a.active {
            background: var(--accent-glow);
            color: var(--accent); font-weight: 600;
        }

        .sidebar nav a.active::before {
            content: ''; position: absolute;
            left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 55%;
            background: var(--accent); border-radius: 0 3px 3px 0;
        }

        .sidebar nav a.logout-link { color: var(--text-faint); }
        .sidebar nav a.logout-link:hover { background: rgba(248,113,113,0.07); color: #f87171; }

        .nav-divider { height: 1px; background: var(--border); margin: 6px 12px; }

        .admin-badge {
            margin-left: auto; font-size: 0.57rem;
            background: var(--accent-glow); color: var(--accent);
            padding: 2px 7px; border-radius: 20px;
            font-weight: 700; text-transform: uppercase;
        }

        /* ══════════════════════════════════════
           THEME TOGGLE BUTTON
        ══════════════════════════════════════ */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .theme-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-label i { font-size: 0.82rem; color: var(--accent); }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 42px;
            height: 22px;
            cursor: pointer;
        }

        .toggle-switch input { display: none; }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: var(--border-input);
            border-radius: 20px;
            transition: background 0.3s ease;
        }

        .toggle-switch input:checked + .toggle-track {
            background: var(--accent);
        }

        .toggle-thumb {
            position: absolute;
            width: 16px; height: 16px;
            background: white;
            border-radius: 50%;
            top: 3px; left: 3px;
            transition: transform 0.3s ease;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .toggle-switch input:checked ~ .toggle-thumb {
            transform: translateX(20px);
        }

        /* ══════════════════════════════════════
           MAIN CONTENT
        ══════════════════════════════════════ */
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 32px;
            min-height: 100vh;
        }

        /* ══════════════════════════════════════
           CARDS
        ══════════════════════════════════════ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .card h2, .card h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 600;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .cards .card { margin-bottom: 0; }
    </style>

    <!-- Apply theme immediately before render to avoid flash -->
    <script>
        (function() {
            const saved = localStorage.getItem('erp_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body>

<div class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Smart ERP">
        <div>
            <span class="brand-name">Smart ERP</span>
            <span class="brand-sub">Management</span>
        </div>
    </div>

    <!-- User -->
    <div class="sidebar-user">
        <div class="user-avatar">{{ session['username'][0].upper() }}</div>
        <div>
            <span class="user-name">{{ session['username'] }}</span>
            <span class="user-role">{{ session['role'] }}</span>
        </div>
    </div>

    <!-- Nav -->
    <nav>
        <div class="nav-label">Main Menu</div>

        <a href="{{ url_for('dashboard') }}"
           class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>

        <a href="{{ url_for('products_page') }}"
           class="{{ 'active' if request.endpoint == 'products_page' else '' }}">
            <i class="fa-solid fa-box-open"></i> Products
        </a>

        <a href="{{ url_for('purchase_page') }}"
           class="{{ 'active' if request.endpoint == 'purchase_page' else '' }}">
            <i class="fa-solid fa-cart-flatbed"></i> Purchase
        </a>

        <a href="{{ url_for('sales_page') }}"
           class="{{ 'active' if request.endpoint == 'sales_page' else '' }}">
            <i class="fa-solid fa-receipt"></i> Sales
        </a>

        {% if session['role'] == 'admin' %}
        <div class="nav-divider"></div>
        <div class="nav-label">Admin</div>
        <a href="{{ url_for('users_page') }}"
           class="{{ 'active' if request.endpoint == 'users_page' else '' }}">
            <i class="fa-solid fa-users-gear"></i> User Management
            <span class="admin-badge">Admin</span>
        </a>
        {% endif %}

        <div class="nav-divider"></div>

        <a href="{{ url_for('shop') }}" target="_blank">
            <i class="fa-solid fa-store"></i> Customer Shop
        </a>

        <div class="nav-divider"></div>

        <a href="{{ url_for('logout') }}" class="logout-link">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </nav>

    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <span class="theme-label">
            <i class="fa-solid fa-circle-half-stroke"></i>
            <span id="themeLabel">Dark Mode</span>
        </span>
        <label class="toggle-switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
        </label>
    </div>

</div>

<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

<script>
// Apply saved theme on every page load
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const toggle = document.getElementById('themeToggle');
    const label  = document.getElementById('themeLabel');
    if (theme === 'light') {
        toggle.checked  = true;
        label.textContent = 'Light Mode';
    } else {
        toggle.checked  = false;
        label.textContent = 'Dark Mode';
    }
}

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('erp_theme', next);
    applyTheme(next);
}

// On load — apply saved preference
const savedTheme = localStorage.getItem('erp_theme') || 'dark';
applyTheme(savedTheme);
</script>

</body>
</html>
